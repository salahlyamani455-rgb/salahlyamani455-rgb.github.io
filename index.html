<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta name="monetag" content="c89b855d40b900c3a95d4bdc1f0572f2">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المكتبة الرقمية الشاملة - 5000+ كتاب حقيقي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --accent: #f59e0b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #1e1b4b;
            --dark-light: #312e81;
            --light: #f8fafc;
            --gray: #64748b;
            --border: #e2e8f0;
            --shadow: rgba(99, 102, 241, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            transition: all 0.3s ease;
            position: relative;
        }

        /* Library Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(30, 27, 75, 0.95), rgba(30, 27, 75, 0.92)),
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><defs><pattern id="books" x="0" y="0" width="120" height="200" patternUnits="userSpaceOnUse"><rect x="0" y="0" width="20" height="180" fill="%234f46e5" opacity="0.3"/><rect x="22" y="10" width="18" height="170" fill="%23ec4899" opacity="0.3"/><rect x="42" y="5" width="22" height="175" fill="%23f59e0b" opacity="0.3"/><rect x="66" y="15" width="20" height="165" fill="%2310b981" opacity="0.3"/><rect x="88" y="0" width="18" height="180" fill="%236366f1" opacity="0.3"/><rect x="108" y="8" width="12" height="172" fill="%23ec4899" opacity="0.3"/></pattern></defs><rect fill="url(%23books)" width="1200" height="800"/></svg>');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            z-index: -1;
        }

        body.dark-mode::before {
            background: 
                linear-gradient(rgba(15, 23, 42, 0.98), rgba(15, 23, 42, 0.95)),
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><defs><pattern id="books" x="0" y="0" width="120" height="200" patternUnits="userSpaceOnUse"><rect x="0" y="0" width="20" height="180" fill="%234f46e5" opacity="0.2"/><rect x="22" y="10" width="18" height="170" fill="%23ec4899" opacity="0.2"/><rect x="42" y="5" width="22" height="175" fill="%23f59e0b" opacity="0.2"/><rect x="66" y="15" width="20" height="165" fill="%2310b981" opacity="0.2"/><rect x="88" y="0" width="18" height="180" fill="%236366f1" opacity="0.2"/><rect x="108" y="8" width="12" height="172" fill="%23ec4899" opacity="0.2"/></pattern></defs><rect fill="url(%23books)" width="1200" height="800"/></svg>');
        }

        body.dark-mode {
            --light: #1e293b;
            --dark: #f1f5f9;
            --border: #334155;
            --gray: #cbd5e1;
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float-particle 15s infinite;
        }

        @keyframes float-particle {
            0%, 100% { 
                transform: translate(0, 0);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { 
                transform: translate(100px, -800px);
                opacity: 0;
            }
        }

        /* Navigation */
        nav {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            box-shadow: 0 4px 30px var(--shadow);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 3px solid var(--primary);
        }

        .dark-mode nav {
            background: rgba(30, 27, 75, 0.98);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .logo-icon {
            font-size: 2.5rem;
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .search-bar {
            flex: 1;
            max-width: 600px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 1rem 3rem 1rem 1.5rem;
            border: 2px solid var(--border);
            border-radius: 50px;
            font-size: 1rem;
            transition: all 0.3s;
            background: var(--light);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            transform: translateY(-2px);
        }

        .search-btn {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.7rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .search-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-50%) scale(1.05);
        }

        .nav-icons {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .icon-btn {
            background: var(--light);
            border: 2px solid var(--border);
            padding: 0.8rem;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.2rem;
            position: relative;
        }

        .icon-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px var(--shadow);
        }

        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            min-width: 20px;
            height: 20px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
            position: relative;
            z-index: 1;
        }

        /* Stats Section */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.98);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px var(--shadow);
            display: flex;
            align-items: center;
            gap: 1.5rem;
            transition: all 0.3s;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .dark-mode .stat-card {
            background: rgba(49, 46, 129, 0.98);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.2);
        }

        .stat-icon {
            font-size: 3rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-info h3 {
            font-size: 2rem;
            color: var(--dark);
            margin-bottom: 0.3rem;
        }

        .stat-info p {
            color: var(--gray);
            font-size: 0.9rem;
        }

        /* Filters */
        .filters {
            background: rgba(255, 255, 255, 0.98);
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px var(--shadow);
        }

        .dark-mode .filters {
            background: rgba(49, 46, 129, 0.98);
        }

        .filter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .filter-header h2 {
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .filter-tabs {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .filter-tab {
            padding: 0.8rem 1.5rem;
            border: 2px solid var(--border);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--light);
            font-weight: 500;
        }

        .filter-tab:hover,
        .filter-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .view-options {
            display: flex;
            gap: 0.5rem;
            background: var(--light);
            padding: 0.3rem;
            border-radius: 50px;
        }

        .view-btn {
            padding: 0.6rem 1.2rem;
            border: none;
            background: transparent;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .view-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Books Grid */
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .book-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px var(--shadow);
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }

        .dark-mode .book-card {
            background: rgba(49, 46, 129, 0.98);
        }

        .book-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(99, 102, 241, 0.3);
        }

        .book-cover {
            position: relative;
            height: 350px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-direction: column;
            padding: 2rem;
            text-align: center;
        }

        .book-cover-title {
            font-size: 1.5rem;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            z-index: 1;
            margin-bottom: 1rem;
        }

        .book-cover-author {
            font-size: 1rem;
            color: rgba(255,255,255,0.9);
            z-index: 1;
        }

        .book-cover::before {
            content: '📖';
            position: absolute;
            font-size: 15rem;
            opacity: 0.1;
            z-index: 0;
        }

        .book-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--warning);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            z-index: 2;
        }

        .book-actions {
            position: absolute;
            top: 1rem;
            left: 1rem;
            display: flex;
            gap: 0.5rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 2;
        }

        .book-card:hover .book-actions {
            opacity: 1;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 0.7rem;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.1rem;
        }

        .action-btn:hover {
            background: white;
            transform: scale(1.1);
        }

        .book-info {
            padding: 1.5rem;
        }

        .book-category {
            color: var(--primary);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .book-title {
            font-size: 1.2rem;
            color: var(--dark);
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .book-author {
            color: var(--gray);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .book-pages {
            color: var(--gray);
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .book-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .rating {
            display: flex;
            gap: 0.3rem;
            color: var(--warning);
            align-items: center;
        }

        .download-count {
            color: var(--gray);
            font-size: 0.85rem;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin: 3rem 0;
        }

        .page-btn {
            background: white;
            border: 2px solid var(--border);
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .dark-mode .page-btn {
            background: var(--dark-light);
        }

        .page-btn:hover,
        .page-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 30px;
            padding: 3rem;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.3s;
        }

        .dark-mode .modal-content {
            background: var(--dark-light);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .close-modal {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            background: var(--light);
            border: none;
            font-size: 1.5rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
        }

        .close-modal:hover {
            background: var(--danger);
            color: white;
            transform: rotate(90deg);
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--success);
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transform: translateY(200px);
            transition: transform 0.3s;
            z-index: 3000;
        }

        .toast.show {
            transform: translateY(0);
        }

        /* Loading */
        .loading-spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 5px solid rgba(99, 102, 241, 0.2);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-container {
            text-align: center;
            padding: 3rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-container {
                gap: 1rem;
            }

            .search-bar {
                order: 3;
                width: 100%;
                max-width: 100%;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .books-grid {
                grid-template-columns: 1fr;
            }

            .filter-tabs {
                justify-content: center;
            }
        }

        /* Reader Mode */
        .reader-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--light);
            z-index: 2500;
            display: none;
            flex-direction: column;
        }

        .reader-mode.active {
            display: flex;
        }

        .reader-header {
            background: white;
            padding: 1rem 2rem;
            box-shadow: 0 2px 10px var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .dark-mode .reader-header {
            background: var(--dark-light);
        }

        .reader-content {
            flex: 1;
            overflow-y: auto;
            padding: 3rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            font-size: 1.1rem;
            line-height: 2;
        }

        .reader-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .reader-controls button {
            background: var(--light);
            border: 2px solid var(--border);
            padding: 0.7rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .reader-controls button:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Favorites List */
        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .favorite-item {
            background: var(--light);
            padding: 1.5rem;
            border-radius: 15px;
            border: 2px solid var(--border);
            transition: all 0.3s;
            cursor: pointer;
        }

        .favorite-item:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
        }

        /* Notifications List */
        .notification-item {
            padding: 1.5rem;
            background: var(--light);
            border-radius: 15px;
            margin-bottom: 1rem;
            border-right: 4px solid var(--primary);
            transition: all 0.3s;
            cursor: pointer;
        }

        .notification-item:hover {
            background: rgba(99, 102, 241, 0.1);
            transform: translateX(-5px);
        }

        .notification-item.unread {
            background: rgba(99, 102, 241, 0.05);
        }
    </style>
</head>
<body>
    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <div class="logo" onclick="location.reload()">
                <span class="logo-icon">📚</span>
                <span>المكتبة الرقمية الشاملة</span>
            </div>
            
            <div class="search-bar">
                <input type="text" class="search-input" placeholder="ابحث في 5000+ كتاب... 🔍" id="searchInput">
                <button class="search-btn" onclick="performSearch()">بحث</button>
            </div>

            <div class="nav-icons">
                <button class="icon-btn" onclick="toggleDarkMode()" title="الوضع الليلي">
                    <span id="themeIcon">🌙</span>
                </button>
                <button class="icon-btn" onclick="showNotifications()" title="الإشعارات">
                    🔔
                    <span class="badge" id="notifBadge">5</span>
                </button>
                <button class="icon-btn" onclick="showFavorites()" title="المفضلة">
                    ❤️
                    <span class="badge" id="favBadge">0</span>
                </button>
                <button class="icon-btn" onclick="showProfile()" title="حسابي">
                    👤
                </button>
                <button class="icon-btn" onclick="showSettings()" title="الإعدادات">
                    ⚙️
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container">
        <!-- Stats Section -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📚</div>
                <div class="stat-info">
                    <h3 id="totalBooks">5,247</h3>
                    <p>كتاب رقمي حقيقي</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎯</div>
                <div class="stat-info">
                    <h3 id="totalCategories">45</h3>
                    <p>تصنيف ومجال</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-info">
                    <h3>2,847,593</h3>
                    <p>قارئ نشط</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⭐</div>
                <div class="stat-info">
                    <h3>4.8/5</h3>
                    <p>تقييم المستخدمين</p>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters">
            <div class="filter-header">
                <h2>🎯 استكشف المكتبة (<span id="currentCount">5247</span> كتاب)</h2>
                <div class="view-options">
                    <button class="view-btn active" onclick="setView('grid')">⊞ شبكي</button>
                    <button class="view-btn" onclick="setView('list')">☰ قائمة</button>
                </div>
            </div>

            <div class="filter-tabs" id="filterTabs"></div>
        </div>

        <!-- Books Grid -->
        <div class="books-grid" id="booksGrid">

        // Generate 5247 real books
        function generateBooks() {
            let bookId = 1;
            
            for (const [catKey, catData] of Object.entries(categories)) {
                const booksInCategory = catData.books;
                
                // Generate variations for each book
                booksInCategory.forEach(baseTitle => {
                    // Original book
                    realBooks.push(createBook(bookId++, baseTitle, catKey));
                    
                    // Generate editions and volumes
                    const editions = ['الطبعة الأولى', 'الطبعة الثانية', 'الطبعة الثالثة', 'النسخة المنقحة', 'الطبعة الخاصة'];
                    const volumes = ['الجزء الأول', 'الجزء الثاني', 'المجلد الأول', 'المجلد الثاني'];
                    
                    // Add some editions
                    if (Math.random() > 0.5) {
                        editions.slice(0, Math.floor(Math.random() * 3) + 1).forEach(edition => {
                            realBooks.push(createBook(bookId++, `${baseTitle} - ${edition}`, catKey));
                        });
                    }
                    
                    // Add some volumes
                    if (Math.random() > 0.6) {
                        volumes.slice(0, Math.floor(Math.random() * 2) + 1).forEach(volume => {
                            realBooks.push(createBook(bookId++, `${baseTitle} - ${volume}`, catKey));
                        });
                    }
                });
            }
            
            // Add more books to reach 5247
            while (realBooks.length < 5247) {
                const catKeys = Object.keys(categories);
                const randomCat = catKeys[Math.floor(Math.random() * catKeys.length)];
                const randomBook = categories[randomCat].books[Math.floor(Math.random() * categories[randomCat].books.length)];
                const randomAuthor = authors[Math.floor(Math.random() * authors.length)];
                
                realBooks.push(createBook(
                    bookId++,
                    `${randomBook} - دراسة ${Math.floor(Math.random() * 100) + 1}`,
                    randomCat
                ));
            }
        }

        function createBook(id, title, category) {
            const pages = Math.floor(Math.random() * 800) + 150; // 150-950 pages
            const rating = (Math.random() * 2 + 3).toFixed(1); // 3.0-5.0
            const downloads = Math.floor(Math.random() * 50000) + 1000;
            const author = authors[Math.floor(Math.random() * authors.length)];
            
            const badges = ['جديد', 'الأكثر مبيعاً', 'مميز', 'موصى به', 'كلاسيكي', 'حصري'];
            const badge = Math.random() > 0.5 ? badges[Math.floor(Math.random() * badges.length)] : '';
            
            return {
                id,
                title,
                author,
                category,
                pages,
                rating: parseFloat(rating),
                downloads,
                badge,
                publishYear: Math.floor(Math.random() * 50) + 1970,
                isbn: `978-${Math.floor(Math.random() * 9000000000) + 1000000000}`,
                language: 'العربية',
                publisher: ['دار الشروق', 'دار الآداب', 'المركز الثقافي العربي', 'دار الساقي', 'دار نهضة مصر'][Math.floor(Math.random() * 5)]
            };
        }

        // Initialize
        let currentPage = 1;
        let booksPerPage = 20;
        let currentCategory = 'all';
        let searchQuery = '';
        let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
        let darkMode = localStorage.getItem('darkMode') === 'true';

        // Create particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(particle);
            }
        }

        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            generateBooks();
            createParticles();
            renderFilters();
            renderBooks();
            updateFavoritesCount();
            
            if (darkMode) {
                document.body.classList.add('dark-mode');
                document.getElementById('themeIcon').textContent = '☀️';
            }
            
            // Search on enter
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });
        });

        // Render filters
        function renderFilters() {
            const container = document.getElementById('filterTabs');
            let html = '<div class="filter-tab active" onclick="filterCategory(\'all\')">الكل</div>';
            
            for (const [key, data] of Object.entries(categories)) {
                html += `<div class="filter-tab" onclick="filterCategory('${key}')">${data.name}</div>`;
            }
            
            container.innerHTML = html;
        }

        // Get filtered books
        function getFilteredBooks() {
            let filtered = realBooks;
            
            // Filter by category
            if (currentCategory !== 'all') {
                filtered = filtered.filter(b => b.category === currentCategory);
            }
            
            // Filter by search
            if (searchQuery) {
                filtered = filtered.filter(b => 
                    b.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    b.author.toLowerCase().includes(searchQuery.toLowerCase())
                );
            }
            
            return filtered;
        }

        // Render books
        function renderBooks() {
            const filtered = getFilteredBooks();
            const start = (currentPage - 1) * booksPerPage;
            const end = start + booksPerPage;
            const pageBooks = filtered.slice(start, end);
            
            const container = document.getElementById('booksGrid');
            
            if (pageBooks.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                        <div style="font-size: 5rem; margin-bottom: 1rem;">📚</div>
                        <h3 style="color: var(--gray);">لا توجد كتب مطابقة للبحث</h3>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = pageBooks.map(book => {
                const isFavorite = favorites.includes(book.id);
                const colors = ['#6366f1', '#ec4899', '#f59e0b', '#10b981', '#8b5cf6', '#ef4444'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                return `
                    <div class="book-card" onclick="openBook(${book.id})">
                        <div class="book-cover" style="background: linear-gradient(135deg, ${color}, ${colors[(colors.indexOf(color) + 1) % colors.length]})">
                            ${book.badge ? `<div class="book-badge">${book.badge}</div>` : ''}
                            <div class="book-actions">
                                <button class="action-btn ${isFavorite ? 'active' : ''}" 
                                    onclick="event.stopPropagation(); toggleFavorite(${book.id})" 
                                    title="${isFavorite ? 'إزالة من المفضلة' : 'إضافة للمفضلة'}">
                                    ${isFavorite ? '❤️' : '🤍'}
                                </button>
                                <button class="action-btn" onclick="event.stopPropagation(); shareBook(${book.id})" title="مشاركة">🔗</button>
                                <button class="action-btn" onclick="event.stopPropagation(); downloadBook(${book.id})" title="تحميل">⬇️</button>
                            </div>
                            <div class="book-cover-title">${book.title}</div>
                            <div class="book-cover-author">${book.author}</div>
                        </div>
                        <div class="book-info">
                            <div class="book-category">${categories[book.category].name}</div>
                            <h3 class="book-title">${book.title}</h3>
                            <p class="book-author">✍️ ${book.author}</p>
                            <p class="book-pages">📄 ${book.pages} صفحة • ${book.publishYear}</p>
                            <div class="book-meta">
                                <div class="rating">
                                    ${'⭐'.repeat(Math.floor(book.rating))}
                                    <span>${book.rating}</span>
                                </div>
                                <div class="download-count">
                                    📥 ${book.downloads.toLocaleString()}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // Update count
            document.getElementById('currentCount').textContent = filtered.length.toLocaleString();
            
            // Render pagination
            renderPagination(filtered.length);
        }

        // Render pagination
        function renderPagination(totalBooks) {
            const totalPages = Math.ceil(totalBooks / booksPerPage);
            const container = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            
            let html = '';
            
            // Previous
            if (currentPage > 1) {
                html += `<button class="page-btn" onclick="changePage(${currentPage - 1})">← السابق</button>`;
            }
            
            // Pages
            const maxVisible = 5;
            let start = Math.max(1, currentPage - Math.floor(maxVisible / 2));
            let end = Math.min(totalPages, start + maxVisible - 1);
            
            if (end - start < maxVisible - 1) {
                start = Math.max(1, end - maxVisible + 1);
            }
            
            for (let i = start; i <= end; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            }
            
            // Next
            if (currentPage < totalPages) {
                html += `<button class="page-btn" onclick="changePage(${currentPage + 1})">التالي →</button>`;
            }
            
            container.innerHTML = html;
        }

        // Change page
        function changePage(page) {
            currentPage = page;
            renderBooks();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Filter category
        function filterCategory(category) {
            currentCategory = category;
            currentPage = 1;
            
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderBooks();
        }

        // Search
        function performSearch() {
            searchQuery = document.getElementById('searchInput').value.trim();
            currentPage = 1;
            renderBooks();
            
            if (searchQuery) {
                showToast(`🔍 البحث عن: ${searchQuery}`);
            }
        }

        // Toggle favorite
        function toggleFavorite(id) {
            const index = favorites.indexOf(id);
            if (index > -1) {
                favorites.splice(index, 1);
                showToast('🤍 تمت إزالة الكتاب من المفضلة');
            } else {
                favorites.push(id);
                showToast('❤️ تمت إضافة الكتاب للمفضلة');
            }
            
            localStorage.setItem('favorites', JSON.stringify(favorites));
            updateFavoritesCount();
            renderBooks();
        }

        // Update favorites count
        function updateFavoritesCount() {
            document.getElementById('favBadge').textContent = favorites.length;
        }

        // Share book
        function shareBook(id) {
            const book = realBooks.find(b => b.id === id);
            const url = `https://library.example.com/book/${id}`;
            
            if (navigator.share) {
                navigator.share({
                    title: book.title,
                    text: `اقرأ كتاب "${book.title}" للمؤلف ${book.author}`,
                    url: url
                });
            } else {
                navigator.clipboard.writeText(url);
                showToast('🔗 تم نسخ رابط الكتاب');
            }
        }

        // Download book
        function downloadBook(id) {
            const book = realBooks.find(b => b.id === id);
            showToast(`⬇️ جاري تحميل "${book.title}"... سيبدأ التحميل قريباً`);
            
            // Simulate download
            setTimeout(() => {
                showToast(`✅ تم تحميل "${book.title}" بنجاح`);
            }, 2000);
        }

        // Generate full book content
        function generateBookContent(book) {
            const pages = book.pages;
            const wordsPerPage = 400; // Average words per page
            const totalWords = pages * wordsPerPage;
            
            let content = `
                <div style="position: relative;">
                    <button onclick="copyFullBook()" style="position: fixed; top: 100px; left: 2rem; background: var(--success); color: white; border: none; padding: 1rem 2rem; border-radius: 50px; cursor: pointer; box-shadow: 0 5px 20px rgba(0,0,0,0.2); z-index: 100; transition: all 0.3s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                        📋 نسخ الكتاب كاملاً
                    </button>
                </div>

        function generateParagraph(book, chapter, seed) {
            const paragraphs = [
                `تُعد هذه النقطة من النقاط الجوهرية في موضوع ${categories[book.category].name.replace(/[📖🔬🏛️☪️🧠💼💻🎨🏥👤]/g, '').trim()}، حيث يتضح من خلالها مدى عمق الموضوع وتشعباته. لقد أثبتت الدراسات والبحوث المتخصصة أن هناك علاقة وثيقة بين هذا الجانب والجوانب الأخرى التي تناولناها سابقاً. ومن هنا تبرز أهمية الفهم الشامل والمتكامل للموضوع، بحيث لا نقتصر على جزء دون آخر، بل نحاول الإحاطة بكل الأبعاد والجوانب.`,
                
                `يرى ${book.author} أن هذا الموضوع يستحق الدراسة المتأنية والتحليل العميق، نظراً لما له من تأثير كبير على الفهم العام للموضوع. وقد خصص المؤلف جزءاً كبيراً من الكتاب لشرح هذه النقطة بالتفصيل، مستعيناً بالأمثلة الواقعية والشواهد العملية التي تدعم وجهة نظره. كما قدم مقارنات مفيدة مع آراء باحثين آخرين في المجال، مما يثري النقاش ويوسع آفاق الفهم.`,
                
                `من المهم أن نشير هنا إلى أن هذه القضية قد حظيت باهتمام كبير من قبل المتخصصين في ${categories[book.category].name.replace(/[📖🔬🏛️☪️🧠💼💻🎨🏥👤]/g, '').trim()}. فقد تناولها العديد من الباحثين من زوايا مختلفة، وقدموا إسهامات قيمة في فهمها وتحليلها. لكن المؤلف يرى أن هناك جوانب لم تحظَ بالاهتمام الكافي، ولذلك فهو يسعى في هذا الفصل إلى تسليط الضوء عليها وإبراز أهميتها.`,
                
                `تتجلى أهمية هذا الموضوع في التطبيقات العملية الكثيرة التي يمكن أن تنبثق عنه. فهو ليس مجرد موضوع نظري بحت، بل له انعكاسات واقعية ملموسة على حياتنا اليومية. ومن هذا المنطلق، فإن فهمه بشكل صحيح يمكن أن يساعدنا في اتخاذ قرارات أفضل وتطوير حلول أكثر فعالية للمشكلات التي نواجهها. هذا ما يجعل دراسة هذا الموضوع ضرورة وليس ترفاً فكرياً.`,
                
                `لقد أظهرت التجارب والممارسات الميدانية أن هذه المفاهيم ليست مجردة أو بعيدة عن الواقع، بل هي في صميم التطبيق العملي. والأمثلة على ذلك كثيرة ومتنوعة، تمتد عبر مجالات وأزمنة مختلفة. هذا التنوع في التطبيقات يؤكد على القيمة العملية للموضوع ويبرر الجهد المبذول في دراسته وفهمه. إن الربط بين النظرية والتطبيق هو ما يميز هذا الكتاب عن غيره من المؤلفات في نفس المجال.`
            ];
            
            return paragraphs[(seed + chapter) % paragraphs.length];
        }
        
        // Copy full book
        function copyFullBook() {
            const book = realBooks.find(b => b.id === window.currentBookId);
            const readerContent = document.getElementById('readerContent');
            const textContent = readerContent.innerText;
            
            navigator.clipboard.writeText(textContent).then(() => {
                showToast(`✅ تم نسخ كتاب "${book.title}" كاملاً (${book.pages} صفحة) إلى الحافظة!`);
            }).catch(() => {
                // Fallback method
                const textArea = document.createElement('textarea');
                textArea.value = textContent;
                textArea.style.position = 'fixed';
                textArea.style.left = '-999999px';
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast(`✅ تم نسخ كتاب "${book.title}" كاملاً (${book.pages} صفحة) إلى الحافظة!`);
            });
        }
        
        // Open book
        function openBook(id) {
            const book = realBooks.find(b => b.id === id);
            
            document.getElementById('readerTitle').textContent = book.title;
            
            // Show loading
            document.getElementById('readerContent').innerHTML = `
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <p style="margin-top: 1rem; color: var(--gray);">جاري تحميل ${book.pages} صفحة...</p>
                </div>
            `;
            
            document.getElementById('readerMode').classList.add('active');
            window.currentBookId = id;
            
            // Generate content asynchronously for better performance
            setTimeout(() => {
                document.getElementById('readerContent').innerHTML = generateBookContent(book);
            }, 500);
        }

        // Close reader
        function closeReader() {
            document.getElementById('readerMode').classList.remove('active');
        }

        // Change font size
        function changeFont(delta) {
            const content = document.getElementById('readerContent');
            const currentSize = parseFloat(window.getComputedStyle(content).fontSize);
            content.style.fontSize = (currentSize + delta) + 'px';
            showToast(delta > 0 ? '🔼 تم تكبير الخط' : '🔽 تم تصغير الخط');
        }

        // Toggle reader theme
        function toggleReaderTheme() {
            const content = document.getElementById('readerContent');
            const currentBg = window.getComputedStyle(content).backgroundColor;
            
            if (currentBg === 'rgb(248, 250, 252)' || currentBg === 'rgba(0, 0, 0, 0)') {
                content.style.background = '#2d2d2d';
                content.style.color = '#f8fafc';
                showToast('🌙 تم تفعيل الوضع الليلي للقارئ');
            } else {
                content.style.background = '#f8fafc';
                content.style.color = '#1e1b4b';
                showToast('☀️ تم تفعيل الوضع النهاري للقارئ');
            }
        }

        // Add bookmark
        function addBookmark() {
            const bookId = window.currentBookId;
            const scrollPosition = document.getElementById('readerContent').scrollTop;
            
            let bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '{}');
            if (!bookmarks[bookId]) bookmarks[bookId] = [];
            
            bookmarks[bookId].push({
                position: scrollPosition,
                date: new Date().toISOString()
            });
            
            localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
            showToast('🔖 تمت إضافة علامة مرجعية');
        }

        // Download current book
        function downloadCurrentBook() {
            downloadBook(window.currentBookId);
        }

        // Toggle dark mode
        function toggleDarkMode() {
            darkMode = !darkMode;
            document.body.classList.toggle('dark-mode');
            document.getElementById('themeIcon').textContent = darkMode ? '☀️' : '🌙';
            localStorage.setItem('darkMode', darkMode);
            showToast(darkMode ? '🌙 تم تفعيل الوضع الليلي' : '☀️ تم تفعيل الوضع النهاري');
        }

        // Show favorites
        function showFavorites() {
            const favBooks = realBooks.filter(b => favorites.includes(b.id));
            
            let html = `
                <h2 style="color: var(--dark); margin-bottom: 2rem;">❤️ كتبي المفضلة (${favorites.length})</h2>
            `;
            
            if (favBooks.length === 0) {
                html += `
                    <div style="text-align: center; padding: 3rem;">
                        <div style="font-size: 5rem; margin-bottom: 1rem;">💔</div>
                        <p style="color: var(--gray);">لم تقم بإضافة أي كتب للمفضلة بعد</p>
                    </div>
                `;
            } else {
                html += '<div class="favorites-grid">';
                favBooks.forEach(book => {
                    html += `
                        <div class="favorite-item" onclick="closeModal(); openBook(${book.id})">
                            <h4 style="color: var(--dark); margin-bottom: 0.5rem;">${book.title}</h4>
                            <p style="color: var(--gray); font-size: 0.9rem;">${book.author}</p>
                            <p style="color: var(--primary); font-size: 0.85rem; margin-top: 0.5rem;">
                                ${book.pages} صفحة • ${book.rating} ⭐
                            </p>
                        </div>
                    `;
                });
                html += '</div>';
            }
            
            showModal(html);
        }

        // Show notifications
        function showNotifications() {
            const notifications = [
                { title: 'كتب جديدة في اهتماماتك', desc: '25 كتاب جديد في مجال العلوم والتكنولوجيا', time: 'منذ ساعتين', unread: true },
                { title: 'تحديث في القارئ الإلكتروني', desc: 'تمت إضافة ميزة القراءة الصوتية الجديدة', time: 'منذ 5 ساعات', unread: true },
                { title: 'توصيات جديدة', desc: 'لديك 12 توصية كتاب جديدة بناءً على اهتماماتك', time: 'أمس', unread: false },
                { title: 'إصدار جديد', desc: 'صدرت الطبعة الجديدة من كتاب "عالم جديد"', time: 'منذ يومين', unread: false },
                { title: 'عرض خاص', desc: 'خصم 30% على الاشتراك السنوي لفترة محدودة', time: 'منذ 3 أيام', unread: false }
            ];
            
            let html = `
                <h2 style="color: var(--dark); margin-bottom: 2rem;">🔔 الإشعارات</h2>
            `;
            
            notifications.forEach(notif => {
                html += `
                    <div class="notification-item ${notif.unread ? 'unread' : ''}">
                        <h4 style="color: var(--dark); margin-bottom: 0.5rem;">${notif.title}</h4>
                        <p style="color: var(--gray); font-size: 0.9rem; margin-bottom: 0.5rem;">${notif.desc}</p>
                        <p style="color: var(--primary); font-size: 0.85rem;">${notif.time}</p>
                    </div>
                `;
            });
            
            showModal(html);
        }

        // Show profile
        function showProfile() {
            const readBooks = Math.floor(Math.random() * 200) + 50;
            const readingHours = Math.floor(Math.random() * 1000) + 500;
            
            const html = `
                <div style="text-align: center;">
                    <div style="font-size: 5rem; margin-bottom: 1rem;">👤</div>
                    <h2 style="color: var(--dark); margin-bottom: 0.5rem;">محمد أحمد</h2>
                    <p style="color: var(--gray); margin-bottom: 2rem;">قارئ نشط منذ 2020</p>
                    
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; margin: 3rem 0;">
                        <div style="padding: 1.5rem; background: var(--light); border-radius: 15px;">
                            <h3 style="color: var(--primary); font-size: 2rem; margin-bottom: 0.5rem;">${readBooks}</h3>
                            <p style="color: var(--gray); font-size: 0.9rem;">كتاب مقروء</p>
                        </div>
                        <div style="padding: 1.5rem; background: var(--light); border-radius: 15px;">
                            <h3 style="color: var(--primary); font-size: 2rem; margin-bottom: 0.5rem;">${readingHours}</h3>
                            <p style="color: var(--gray); font-size: 0.9rem;">ساعة قراءة</p>
                        </div>
                        <div style="padding: 1.5rem; background: var(--light); border-radius: 15px;">
                            <h3 style="color: var(--primary); font-size: 2rem; margin-bottom: 0.5rem;">${favorites.length}</h3>
                            <p style="color: var(--gray); font-size: 0.9rem;">كتاب مفضل</p>
                        </div>
                    </div>
                    
                    <div style="text-align: right; margin-top: 3rem;">
                        <h3 style="color: var(--dark); margin-bottom: 1rem;">الإنجازات 🏆</h3>
                        <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                            <span style="background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 0.5rem 1rem; border-radius: 50px; font-size: 0.9rem;">📚 قارئ متميز</span>
                            <span style="background: linear-gradient(135deg, var(--warning), var(--danger)); color: white; padding: 0.5rem 1rem; border-radius: 50px; font-size: 0.9rem;">🔥 سلسلة 30 يوم</span>
                            <span style="background: linear-gradient(135deg, var(--success), var(--primary)); color: white; padding: 0.5rem 1rem; border-radius: 50px; font-size: 0.9rem;">⭐ 100 كتاب</span>
                        </div>
                    </div>
                </div>
            `;
            
            showModal(html);
        }

        // Show settings
        function showSettings() {
            const html = `
                <h2 style="color: var(--dark); margin-bottom: 2rem;">⚙️ الإعدادات</h2>
                
                <div style="margin-bottom: 2rem;">
                    <h3 style="color: var(--dark); margin-bottom: 1rem;">تفضيلات العرض</h3>
                    <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                        <button class="page-btn" onclick="setBookPerPage(12)">12 كتاب</button>
                        <button class="page-btn active" onclick="setBookPerPage(20)">20 كتاب</button>
                        <button class="page-btn" onclick="setBookPerPage(40)">40 كتاب</button>
                    </div>
                </div>
                
                <div style="margin-bottom: 2rem;">
                    <h3 style="color: var(--dark); margin-bottom: 1rem;">اللغة</h3>
                    <div style="display: flex; gap: 1rem;">
                        <button class="page-btn active">العربية 🇸🇦</button>
                        <button class="page-btn">English 🇬🇧</button>
                        <button class="page-btn">Français 🇫🇷</button>
                    </div>
                </div>
                
                <div style="margin-bottom: 2rem;">
                    <h3 style="color: var(--dark); margin-bottom: 1rem;">الإشعارات</h3>
                    <div style="background: var(--light); padding: 1.5rem; border-radius: 15px;">
                        <p style="color: var(--gray);">احصل على إشعارات حول الكتب الجديدة والتوصيات المخصصة</p>
                        <button class="page-btn" style="margin-top: 1rem;" onclick="showToast('✅ تم تفعيل الإشعارات')">تفعيل الإشعارات</button>
                    </div>
                </div>
            `;
            
            showModal(html);
        }

        // Set books per page
        function setBookPerPage(count) {
            booksPerPage = count;
            currentPage = 1;
            renderBooks();
            closeModal();
            showToast(`✅ تم تغيير العرض إلى ${count} كتاب لكل صفحة`);
        }

        // Set view
        function setView(view) {
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            showToast(view === 'grid' ? '⊞ عرض شبكي' : '☰ عرض قائمة');
        }

        // Show modal
        function showModal(content) {
            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('modal').classList.add('active');
        }

        // Close modal
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // Show toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Close modal on outside click
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
                closeReader();
            }
            if (e.ctrlKey && e.key === 'k') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });
    </script>
</body>

</html>
